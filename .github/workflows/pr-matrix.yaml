name: Execution Testing

permissions:
  contents: read

on:
  pull_request:
    branches:
      - main

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  Build-x86:
    permissions:
      contents: read
    # Every non-macOS test group runs at least one x86 GPU SKU, so build x86
    # whenever any of those groups will run.
    if: >-
      !contains(github.event.pull_request.labels.*.name, 'disable-default-tests')
      || contains(github.event.pull_request.labels.*.name, 'test-warp')
      || contains(github.event.pull_request.labels.*.name, 'test-all')
      || contains(github.event.pull_request.labels.*.name, 'test-lavapipe')
      || contains(github.event.pull_request.labels.*.name, 'test-dx-all')
      || contains(github.event.pull_request.labels.*.name, 'test-vk-all')
    uses: ./.github/workflows/build-callable.yaml
    with:
      OS: windows
      SKU: windows-amd
      OffloadTest-branch: ${{ github.event.pull_request.head.sha }}
      LLVM-ExtraCMakeArgs: -DCMAKE_C_COMPILER=clang-cl -DCMAKE_CXX_COMPILER=clang-cl -DOFFLOADTEST_USE_CLANG_TIDY=ON

  Build-arm:
    permissions:
      contents: read
    # The ARM (windows-qc) SKU is exercised by the Warp group and every
    # label-gated Extra group, so build ARM under the same conditions as x86.
    if: >-
      !contains(github.event.pull_request.labels.*.name, 'disable-default-tests')
      || contains(github.event.pull_request.labels.*.name, 'test-warp')
      || contains(github.event.pull_request.labels.*.name, 'test-all')
      || contains(github.event.pull_request.labels.*.name, 'test-lavapipe')
      || contains(github.event.pull_request.labels.*.name, 'test-dx-all')
      || contains(github.event.pull_request.labels.*.name, 'test-vk-all')
    uses: ./.github/workflows/build-callable.yaml
    with:
      OS: windows
      SKU: windows-qc
      OffloadTest-branch: ${{ github.event.pull_request.head.sha }}
      LLVM-ExtraCMakeArgs: -DCMAKE_C_COMPILER=clang-cl -DCMAKE_CXX_COMPILER=clang-cl -DOFFLOADTEST_USE_CLANG_TIDY=ON

  Build-macos:
    permissions:
      contents: read
    # macOS is only exercised by the default macOS test group, so only build
    # it when that group will run.
    if: ${{ !contains(github.event.pull_request.labels.*.name, 'disable-default-tests') }}
    uses: ./.github/workflows/build-callable.yaml
    with:
      OS: macOS
      SKU: macos
      OffloadTest-branch: ${{ github.event.pull_request.head.sha }}

  Exec-Tests-Windows:
    permissions:
      contents: read
      checks: write
    needs: Build-x86
    if: ${{ !contains(github.event.pull_request.labels.*.name, 'disable-default-tests') }}
    strategy:
      fail-fast: false
      matrix:
        SKU: [windows-intel, windows-nvidia]
        TestTarget: [check-hlsl-d3d12, check-hlsl-vk, check-hlsl-clang-d3d12, check-hlsl-clang-vk]
        exclude:
          - { SKU: windows-nvidia, TestTarget: check-hlsl-vk }
          - { SKU: windows-nvidia, TestTarget: check-hlsl-clang-vk }

    uses: ./.github/workflows/test-callable.yaml
    with:
      OS: windows
      SKU: ${{ matrix.SKU }}
      TestTarget: ${{ matrix.TestTarget }}

  Exec-Tests-Windows-Warp:
    permissions:
      contents: read
      checks: write
    needs: [Build-x86, Build-arm]
    if: >-
      contains(github.event.pull_request.labels.*.name, 'test-warp')
      || !contains(github.event.pull_request.labels.*.name, 'disable-default-tests')
    strategy:
      fail-fast: false
      matrix:
        SKU: [windows-intel, windows-sw-rasterizer-x86_64, windows-qc]
        TestTarget: [check-hlsl-warp-d3d12, check-hlsl-clang-warp-d3d12]

    uses: ./.github/workflows/test-callable.yaml
    with:
      OS: windows
      SKU: ${{ matrix.SKU }}
      TestTarget: ${{ matrix.TestTarget }}

  Exec-Tests-Extra:
    permissions:
      contents: read
      checks: write
    needs: [Build-x86, Build-arm]
    if: contains( github.event.pull_request.labels.*.name, 'test-all')
    strategy:
      fail-fast: false
      matrix:
        SKU: [windows-amd, windows-nvidia, windows-qc]
        TestTarget: [check-hlsl-d3d12, check-hlsl-vk, check-hlsl-clang-d3d12, check-hlsl-clang-vk, check-hlsl-vk-lavapipe, check-hlsl-clang-vk-lavapipe]
        exclude:
          - { SKU: windows-nvidia, TestTarget: check-hlsl-d3d12 }
          - { SKU: windows-nvidia, TestTarget: check-hlsl-clang-d3d12 }
          - { SKU: windows-nvidia, TestTarget: check-hlsl-vk-lavapipe }
          - { SKU: windows-nvidia, TestTarget: check-hlsl-clang-vk-lavapipe }

    uses: ./.github/workflows/test-callable.yaml
    with:
      OS: windows
      SKU: ${{ matrix.SKU }}
      TestTarget: ${{ matrix.TestTarget }}

  Exec-Tests-Extra-Lavapipe:
    permissions:
      contents: read
      checks: write
    needs: [Build-x86, Build-arm]
    if: >-
      contains(github.event.pull_request.labels.*.name, 'test-lavapipe')
      && !contains(github.event.pull_request.labels.*.name, 'test-all')
    strategy:
      fail-fast: false
      matrix:
        SKU: [windows-amd, windows-sw-rasterizer-x86_64, windows-qc]
        TestTarget: [check-hlsl-vk-lavapipe, check-hlsl-clang-vk-lavapipe]

    uses: ./.github/workflows/test-callable.yaml
    with:
      OS: windows
      SKU: ${{ matrix.SKU }}
      TestTarget: ${{ matrix.TestTarget }}

  Exec-Tests-Extra-DX-All:
    permissions:
      contents: read
      checks: write
    needs: [Build-x86, Build-arm]
    if: >-
      contains(github.event.pull_request.labels.*.name, 'test-dx-all')
      && !contains(github.event.pull_request.labels.*.name, 'test-all')
    strategy:
      fail-fast: false
      matrix:
        SKU: [windows-amd, windows-qc]
        TestTarget: [check-hlsl-d3d12, check-hlsl-clang-d3d12]

    uses: ./.github/workflows/test-callable.yaml
    with:
      OS: windows
      SKU: ${{ matrix.SKU }}
      TestTarget: ${{ matrix.TestTarget }}

  Exec-Tests-Extra-VK-All:
    permissions:
      contents: read
      checks: write
    needs: [Build-x86, Build-arm]
    if: >-
      contains(github.event.pull_request.labels.*.name, 'test-vk-all')
      && !contains(github.event.pull_request.labels.*.name, 'test-all')
    strategy:
      fail-fast: false
      matrix:
        SKU: [windows-amd, windows-nvidia, windows-qc]
        TestTarget: [check-hlsl-vk, check-hlsl-clang-vk, check-hlsl-vk-lavapipe, check-hlsl-clang-vk-lavapipe]
        exclude:
          - { SKU: windows-nvidia, TestTarget: check-hlsl-vk-lavapipe }
          - { SKU: windows-nvidia, TestTarget: check-hlsl-clang-vk-lavapipe }

    uses: ./.github/workflows/test-callable.yaml
    with:
      OS: windows
      SKU: ${{ matrix.SKU }}
      TestTarget: ${{ matrix.TestTarget }}

  Exec-Tests-MacOS:
    permissions:
      contents: read
      checks: write
    needs: Build-macos
    if: ${{ !contains(github.event.pull_request.labels.*.name, 'disable-default-tests') }}
    strategy:
      fail-fast: false
      matrix:
        SKU: [macos]
        TestTarget: [check-hlsl-mtl, check-hlsl-clang-mtl]

    uses: ./.github/workflows/test-callable.yaml
    with:
      OS: macOS
      SKU: ${{ matrix.SKU }}
      TestTarget: ${{ matrix.TestTarget }}
