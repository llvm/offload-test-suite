name: HLSL Test

permissions:
  contents: read

on:
  workflow_dispatch:
    inputs:
      OffloadTest-branch:
        description: 'Test Suite Branch'
        required: false
        default: 'main'
        type: string
      OffloadTest-fork:
        description: 'Test Suite fork'
        required: false
        default: 'llvm'
        type: string
      LLVM-branch:
        description: 'LLVM Branch'
        required: false
        default: 'main'
        type: string
      LLVM-fork:
        description: 'LLVM fork'
        required: false
        default: 'llvm'
        type: string
      DXC-branch:
        description: 'DXC Branch'
        required: false
        default: 'main'
        type: string
      BuildType:
        description: 'Build Type'
        required: false
        default: 'RelWithDebInfo'
        type: choice
        options:
        - Release
        - RelWithDebInfo
        - Debug
      TestTarget:
        required: false
        default: 'check-hlsl'
        type: string
      OS:
        required: true
        type: choice
        options:
        - macOS
        - windows
      SKU:
        required: true
        type: choice
        options:
        - macos
        - windows-amd
        - windows-intel
        - windows-nvidia
        - windows-qc
      SplitBuild:
        description: 'Split build and test into separate jobs (build on any runner, test on GPU runner)'
        required: false
        default: false
        type: boolean
      LLVM-ExtraCMakeArgs:
        description: 'Extra CMake Args for LLVM'
        required: false
        default: ''
        type: string
  workflow_call:
    inputs:
      OffloadTest-branch:
        description: 'Test Suite Branch'
        required: false
        default: 'main'
        type: string
      OffloadTest-fork:
        description: 'Test Suite Fork'
        required: false
        default: 'llvm'
        type: string
      LLVM-branch:
        description: 'LLVM Branch'
        required: false
        default: 'main'
        type: string
      LLVM-fork:
        description: 'LLVM Fork'
        required: false
        default: 'llvm'
        type: string
      DXC-branch:
        description: 'DXC Branch'
        required: false
        default: 'main'
        type: string
      OS:
        required: true
        type: string
      SKU:
        required: true
        type: string
      SplitBuild:
        description: 'Split build and test into separate jobs'
        required: false
        default: false
        type: boolean
      BuildType:
        description: 'Build Config'
        required: false
        default: 'RelWithDebInfo'
        type: string
      TestTarget:
        required: false
        default: 'check-hlsl'
        type: string
      LLVM-ExtraCMakeArgs:
        description: 'Extra CMake Args for LLVM'
        required: false
        default: ''
        type: string

jobs:
  build:
    permissions:
      checks: write
    # When SplitBuild is true, build on any available runner that can produce
    # the requested target. windows-qc targets ARM64 but may cross-compile on
    # an X64 Windows builder. Otherwise, build on the GPU runner.
    runs-on: >-
      ${{ fromJSON(
        inputs.SplitBuild != true
          && format('["self-hosted", "hlsl-{0}"]', inputs.SKU)
        || inputs.SKU == 'windows-qc'
          && '["self-hosted", "Windows"]'
        || inputs.SKU == 'macos'
          && '["self-hosted", "hlsl-macos"]'
        || '["self-hosted", "Windows", "X64"]'
      ) }}
    steps:
      - name: Checkout DXC
        uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6.0.1
        with:
          repository: Microsoft/DirectXShaderCompiler
          ref: ${{ inputs.DXC-branch }}
          path: DXC
          fetch-depth: 1
          submodules: true
      - name: Checkout LLVM
        uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6.0.1
        with:
          repository: ${{ inputs.LLVM-fork }}/llvm-project
          ref: ${{ inputs.LLVM-branch }}
          path: llvm-project
          fetch-depth: 1
      - name: Checkout OffloadTest
        uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6.0.1
        with:
          repository: ${{ inputs.OffloadTest-fork }}/offload-test-suite
          ref: ${{ inputs.OffloadTest-branch }}
          path: OffloadTest
          fetch-depth: 1
      - name: Checkout Golden Images
        uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6.0.1
        with:
          repository: llvm/offload-golden-images
          ref: main
          path: golden-images
          fetch-depth: 1
      - name: Setup Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          pip-install: -r ${{ github.workspace }}/OffloadTest/test/requirements.txt
      - name: Setup Windows host tools
        if: >-
          inputs.OS == 'windows'
          && inputs.SplitBuild == true
          && inputs.SKU == 'windows-qc'
          && runner.arch != 'ARM64'
        uses: llvm/actions/setup-windows@89a8cf80982d830faab019237860b344a6390c30 # main
        with:
          arch: amd64
      - name: Build native host tools
        if: >-
          inputs.OS == 'windows'
          && inputs.SplitBuild == true
          && inputs.SKU == 'windows-qc'
          && runner.arch != 'ARM64'
        shell: bash
        run: |
            set -euxo pipefail

            cmake -G Ninja \
              -S "$GITHUB_WORKSPACE/DXC" \
              -B "$GITHUB_WORKSPACE/DXC/host-build" \
              -DCMAKE_BUILD_TYPE=Release \
              -DLLVM_ENABLE_ASSERTIONS=Off \
              -C "$GITHUB_WORKSPACE/DXC/cmake/caches/PredefinedParams.cmake" \
              -C "$GITHUB_WORKSPACE/OffloadTest/cmake/caches/sccache.cmake" \
              -DHLSL_DISABLE_SOURCE_GENERATION=On
            cmake --build "$GITHUB_WORKSPACE/DXC/host-build" \
              --target llvm-tblgen clang-tblgen llvm-config

            cmake -G Ninja \
              -S "$GITHUB_WORKSPACE/llvm-project/llvm" \
              -B "$GITHUB_WORKSPACE/llvm-project/host-build" \
              -DCMAKE_BUILD_TYPE=Release \
              -DLLVM_ENABLE_ASSERTIONS=Off \
              -DLLVM_ENABLE_PROJECTS=clang \
              -DLLVM_TARGETS_TO_BUILD=Native \
              -C "$GITHUB_WORKSPACE/OffloadTest/cmake/caches/sccache.cmake"
            cmake --build "$GITHUB_WORKSPACE/llvm-project/host-build" \
              --target llvm-tblgen clang-tblgen llvm-config
      - name: Setup Windows x64 target
        if: inputs.OS == 'windows' && inputs.SKU != 'windows-qc'
        uses: llvm/actions/setup-windows@89a8cf80982d830faab019237860b344a6390c30 # main
        with:
          arch: amd64
      - name: Setup Windows ARM64 cross target
        if: >-
          inputs.OS == 'windows'
          && inputs.SKU == 'windows-qc'
          && runner.arch != 'ARM64'
        uses: llvm/actions/setup-windows@89a8cf80982d830faab019237860b344a6390c30 # main
        with:
          # setup-windows forwards this input to VsDevCmd.bat after -arch=.
          arch: arm64 -host_arch=amd64
      - name: Setup Windows ARM64 native target
        if: >-
          inputs.OS == 'windows'
          && inputs.SKU == 'windows-qc'
          && runner.arch == 'ARM64'
        uses: llvm/actions/setup-windows@89a8cf80982d830faab019237860b344a6390c30 # main
        with:
          arch: arm64
      # VsDevCmd replaces PATH. Run setup-python after the final target setup
      # so Python and Git Bash are available to the remaining workflow steps.
      - name: Restore Python and Git Bash paths
        if: inputs.OS == 'windows'
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
      - name: Report Windows build architecture
        if: inputs.OS == 'windows'
        shell: bash
        run: |
          echo "Runner architecture: ${{ runner.arch }}"
          echo "MSVC host architecture: ${VSCMD_ARG_HOST_ARCH:-unknown}"
          echo "MSVC target architecture: ${VSCMD_ARG_TGT_ARCH:-unknown}"
      # When SplitBuild is enabled, force clang into the build set even if
      # the TestTarget doesn't use it. Reason: install-distribution depends
      # on clang (it ships in the install prefix), so if clang isn't part
      # of hlsl-test-depends, the Install step ends up doing a from-scratch
      # clang compile that dwarfs Build LLVM. Including it here keeps all
      # compile work inside Build LLVM and reduces Install to seconds.
      - name: Detect Clang
        id: Test-Clang
        shell: bash
        if: contains(inputs.TestTarget, 'clang') || inputs.SplitBuild == true
        run: echo TEST_CLANG=On >> $GITHUB_OUTPUT
      - name: Build DXC
        shell: bash
        run: |
            set -exo pipefail
            cross_args=()
            if [ '${{ inputs.SplitBuild }}' = 'true' ] \
              && [ '${{ inputs.SKU }}' = 'windows-qc' ] \
              && [ '${{ runner.arch }}' != 'ARM64' ]; then
              cross_args=(
                -DCMAKE_SYSTEM_NAME=Windows
                -DCMAKE_SYSTEM_PROCESSOR=ARM64
                "-DLLVM_NATIVE_BUILD=$GITHUB_WORKSPACE/DXC/host-build"
                "-DLLVM_TABLEGEN=$GITHUB_WORKSPACE/DXC/host-build/bin/llvm-tblgen.exe"
                "-DCLANG_TABLEGEN=$GITHUB_WORKSPACE/DXC/host-build/bin/clang-tblgen.exe"
              )
            fi
            cmake -G Ninja \
              -S "$GITHUB_WORKSPACE/DXC" \
              -B "$GITHUB_WORKSPACE/DXC/build" \
              -DCMAKE_BUILD_TYPE=${{ inputs.BuildType }} \
              -DLLVM_ENABLE_ASSERTIONS=On \
              -C "$GITHUB_WORKSPACE/DXC/cmake/caches/PredefinedParams.cmake" \
              -C "$GITHUB_WORKSPACE/OffloadTest/cmake/caches/sccache.cmake" \
              -DHLSL_DISABLE_SOURCE_GENERATION=On \
              "${cross_args[@]}"
            cmake --build "$GITHUB_WORKSPACE/DXC/build"
      - name: Build LLVM
        shell: bash
        run: |
            set -exo pipefail
            cross_args=()
            if [ '${{ inputs.SplitBuild }}' = 'true' ] \
              && [ '${{ inputs.SKU }}' = 'windows-qc' ] \
              && [ '${{ runner.arch }}' != 'ARM64' ]; then
              cross_args=(
                -DCMAKE_SYSTEM_NAME=Windows
                -DCMAKE_SYSTEM_PROCESSOR=ARM64
                -DCMAKE_C_COMPILER_TARGET=arm64-pc-windows-msvc
                -DCMAKE_CXX_COMPILER_TARGET=arm64-pc-windows-msvc
                "-DLLVM_NATIVE_BUILD=$GITHUB_WORKSPACE/llvm-project/host-build"
                "-DLLVM_NATIVE_TOOL_DIR=$GITHUB_WORKSPACE/llvm-project/host-build/bin"
              )
            fi
            cmake -G Ninja \
              -S "$GITHUB_WORKSPACE/llvm-project/llvm" \
              -B "$GITHUB_WORKSPACE/llvm-project/build" \
              ${{ inputs.LLVM-ExtraCMakeArgs }} \
              -DCMAKE_BUILD_TYPE=${{ inputs.BuildType }} \
              -DLLVM_ENABLE_ASSERTIONS=On \
              -DLLVM_EXTERNAL_PROJECTS="OffloadTest" \
              -DHLSL_ENABLE_OFFLOAD_DISTRIBUTION=${{ inputs.SplitBuild == true && 'On' || 'Off' }} \
              -C "$GITHUB_WORKSPACE/llvm-project/clang/cmake/caches/HLSL.cmake" \
              -C "$GITHUB_WORKSPACE/OffloadTest/cmake/caches/sccache.cmake" \
              "-DDXC_DIR=$GITHUB_WORKSPACE/DXC/build/bin" \
              "-DLLVM_EXTERNAL_OFFLOADTEST_SOURCE_DIR=$GITHUB_WORKSPACE/OffloadTest" \
              -DLLVM_LIT_ARGS="--xunit-xml-output=testresults.xunit.xml -v" \
              -DOFFLOADTEST_TEST_CLANG=${{steps.Test-Clang.outputs.TEST_CLANG || 'Off' }} \
              "-DGOLDENIMAGE_DIR=$GITHUB_WORKSPACE/golden-images" \
              "-DCMAKE_INSTALL_PREFIX=$GITHUB_WORKSPACE/install" \
              "${cross_args[@]}"
            cmake --build "$GITHUB_WORKSPACE/llvm-project/build" \
              --target hlsl-test-depends
      - name: Verify ARM64 build artifacts
        if: >-
          inputs.OS == 'windows'
          && inputs.SplitBuild == true
          && inputs.SKU == 'windows-qc'
        shell: powershell
        run: |
          $expectedMachine = 0xAA64
          $files = @(
            "$env:GITHUB_WORKSPACE\DXC\build\bin\dxc.exe",
            "$env:GITHUB_WORKSPACE\llvm-project\build\bin\clang.exe"
          )
          foreach ($file in $files) {
            $stream = [System.IO.File]::OpenRead($file)
            try {
              $reader = [System.IO.BinaryReader]::new($stream)
              $stream.Position = 0x3c
              $peOffset = $reader.ReadInt32()
              $stream.Position = $peOffset + 4
              $machine = $reader.ReadUInt16()
            } finally {
              $stream.Dispose()
            }
            if ($machine -ne $expectedMachine) {
              throw "$file has PE machine 0x$($machine.ToString('X4')); expected ARM64 (0xAA64)"
            }
            Write-Host "$file is ARM64"
          }
      # Surface sccache cache state after the heavy compile work so we can
      # track hit rate / cache size across runs and diagnose cold-cache
      # blowups on new builders. Always-runs so we still get stats on
      # build failure.
      - name: Dump sccache Stats
        if: always()
        shell: bash
        run: sccache --show-stats || true
      - name: Dump GPU Info (build runner)
        if: inputs.SplitBuild != true
        run: |
            cd llvm-project
            cd build
            ./bin/api-query
      - name: Setup Lavapipe
        if: inputs.SplitBuild != true && contains(inputs.TestTarget, 'lavapipe')
        shell: bash
        run: |
            set -euxo pipefail
            # Lavapipe is found in the following resolution order:
            #   1. LAVAPIPE_ICD_JSON, if the runner image exposes it.
            #   2. The machine-wide registration under
            #      HKLM\SOFTWARE\Khronos\Vulkan\Drivers (value name = ICD path).
            # If neither resolves to an existing file, skip shadowing and rely
            # on lit.cfg.py selecting the llvmpipe device by name.
            icd=""
            if [ -n "${LAVAPIPE_ICD_JSON:-}" ]; then
              fs=$(printf '%s' "$LAVAPIPE_ICD_JSON" | sed 's|\\|/|g')
              if [ -f "$fs" ]; then
                icd="$LAVAPIPE_ICD_JSON"
              else
                echo "::warning::LAVAPIPE_ICD_JSON is set but does not point to an existing file: $LAVAPIPE_ICD_JSON"
              fi
            fi
            if [ -z "$icd" ]; then
              matches=$(MSYS_NO_PATHCONV=1 reg query "HKLM\\SOFTWARE\\Khronos\\Vulkan\\Drivers" /reg:64 2>/dev/null | grep -i "lvp_icd") || matches=""
              line=${matches%%$'\n'*}
              cand=$(printf '%s' "$line" | sed -E 's/^[[:space:]]+//; s/[[:space:]]+REG_[A-Z_]+[[:space:]]+0x[0-9A-Fa-f]+[[:space:]]*$//')
              if [ -n "$cand" ]; then
                fs=$(printf '%s' "$cand" | sed 's|\\|/|g')
                if [ -f "$fs" ]; then
                  icd="$cand"
                fi
              fi
            fi
            if [ -z "$icd" ]; then
              echo "::notice::No lavapipe ICD resolved via LAVAPIPE_ICD_JSON or HKLM\\SOFTWARE\\Khronos\\Vulkan\\Drivers; relying on machine-wide registration and adapter-regex device selection."
              exit 0
            fi
            echo "VK_DRIVER_FILES=$icd" >> "$GITHUB_ENV"
            echo "VK_ICD_FILENAMES=$icd" >> "$GITHUB_ENV"
            echo "Using lavapipe ICD: $icd"
      - name: Run HLSL Tests
        if: inputs.SplitBuild != true
        run: |
            cd llvm-project
            cd build
            ninja check-hlsl-unit
            ninja ${{ inputs.TestTarget }}
      - name: Publish Test Results (macOS)
        uses: EnricoMi/publish-unit-test-result-action/macos@34d7c956a59aed1bfebf31df77b8de55db9bbaaf # v2.21.0
        if: >-
          always() && inputs.OS == 'macOS'
          && inputs.SplitBuild != true
        with:
          comment_mode: off
          files: llvm-project/build/**/testresults.xunit.xml
      - name: Upload test results
        if: always() && inputs.SplitBuild != true
        uses: actions/upload-artifact@v4
        with:
          name: test-results-${{ inputs.SKU }}-${{ inputs.TestTarget }}
          path: llvm-project/build/**/testresults.xunit.xml
          if-no-files-found: ignore
      - name: Run dxdiag (Windows only)
        if: >-
          inputs.OS == 'windows' && failure()
          && inputs.SplitBuild != true
        shell: powershell
        run: |
          $fileName = "dxdiag.txt"
          $output = Join-Path $env:RUNNER_TEMP $fileName
          dxdiag /t $output | Out-Null
          Write-Host "DxDiag report saved to $output"
      - name: Upload dxdiag artifact
        if: >-
          inputs.OS == 'windows' && failure()
          && inputs.SplitBuild != true
        uses: actions/upload-artifact@v4
        with:
          name: dxdiag-${{ inputs.SKU }}-${{inputs.TestTarget}}.txt
          path: ${{ runner.temp }}/dxdiag.txt

      # When SplitBuild is true, install the LLVM/DXC distribution and the
      # standalone offload test suite into a single portable prefix, then
      # tar that prefix for the test job. The prefix is fully self-contained:
      # tools under bin/, test sources + configure script under
      # share/hlsl-test-suite/. No CMake, ninja, or compiler toolchain is
      # required on the test runner.
      - name: Install distribution
        if: inputs.SplitBuild == true
        shell: bash
        run: |
            set -euxo pipefail
            # Prevent stale extraction dirs from previous runs from persisting            
            rm -rf "$GITHUB_WORKSPACE/install" "$GITHUB_WORKSPACE/dxc-dist"
            cd $GITHUB_WORKSPACE/llvm-project/build
            ninja install-distribution install-offload-tools install-offload-test-suite
            # Stage DXC into a portable bin/+lib/ tree at dxc-dist.
            # See docs/offload-distribution.md ("DXC prefix") for the
            # rationale (DXC's install targets don't cover everything we
            # need, so we cherry-pick from the build directory).
            buildbin=$GITHUB_WORKSPACE/DXC/build/bin
            buildlib=$GITHUB_WORKSPACE/DXC/build/lib
            distbin=$GITHUB_WORKSPACE/dxc-dist/bin
            distlib=$GITHUB_WORKSPACE/dxc-dist/lib
            mkdir -p "$distbin" "$distlib"
            case "$RUNNER_OS" in
              Windows)
                cp "$buildbin/dxc.exe"          "$distbin/"
                cp "$buildbin/dxv.exe"          "$distbin/"
                cp "$buildbin/dxcompiler.dll"   "$distbin/"
                cp "$buildbin/dxil.dll"         "$distbin/"
                # PDBs only exist for configs that emit /Zi (Debug,
                # RelWithDebInfo). Release / MinSizeRel produce no
                # .pdb files, so we skip the copy in those cases.
                case "${{ inputs.BuildType }}" in
                  Debug|RelWithDebInfo)
                    cp "$buildbin/dxc.pdb"        "$distbin/"
                    cp "$buildbin/dxv.pdb"        "$distbin/"
                    cp "$buildbin/dxcompiler.pdb" "$distbin/"
                    cp "$buildbin/dxil.pdb"       "$distbin/" ;;
                esac
                cp "$buildlib/dxcompiler.lib"   "$distlib/"
                cp "$buildlib/dxil.lib"         "$distlib/" ;;
              Linux)
                cp "$buildbin/dxc"              "$distbin/"
                cp "$buildbin/dxv"              "$distbin/"
                cp "$buildlib/libdxcompiler.so" "$distlib/"
                cp "$buildlib/libdxil.so"       "$distlib/" ;;
              macOS)
                cp "$buildbin/dxc"                  "$distbin/"
                cp "$buildbin/dxv"                  "$distbin/"
                cp "$buildlib/libdxcompiler.dylib"  "$distlib/"
                cp "$buildlib/libdxil.dylib"        "$distlib/" ;;
              *)
                echo "Unsupported RUNNER_OS=$RUNNER_OS" >&2; exit 1 ;;
            esac
      - name: Package install prefix
        if: inputs.SplitBuild == true
        shell: bash
        run: |
            cd $GITHUB_WORKSPACE
            # Use stdout redirection so tar doesn't try to parse the
            # destination Windows drive letter (e.g. C:\...) as a remote
            # host:path tuple.
            tar cf - -C install . > "$RUNNER_TEMP/build-artifacts.tar"
            tar cf - -C dxc-dist . > "$RUNNER_TEMP/dxc-artifacts.tar"
      - name: Upload build artifacts
        if: inputs.SplitBuild == true
        uses: actions/upload-artifact@v4
        with:
          name: build-${{ inputs.SKU }}-${{ inputs.TestTarget }}
          path: ${{ runner.temp }}/build-artifacts.tar
          retention-days: 1
      - name: Upload DXC artifacts
        if: inputs.SplitBuild == true
        uses: actions/upload-artifact@v4
        with:
          name: dxc-${{ inputs.SKU }}-${{ inputs.TestTarget }}
          path: ${{ runner.temp }}/dxc-artifacts.tar
          retention-days: 1

  test:
    if: inputs.SplitBuild == true
    needs: build
    permissions:
      checks: write
    runs-on: [self-hosted, "hlsl-${{ inputs.SKU }}"]
    steps:
      # Test job consumes ONLY the install tarball produced by the build job.
      # No source checkouts of llvm-project / DXC / OffloadTest are needed
      # here -- everything required to run lit lives inside the prefix.
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: build-${{ inputs.SKU }}-${{ inputs.TestTarget }}
          path: ${{ runner.temp }}
      - name: Download DXC artifacts
        uses: actions/download-artifact@v4
        with:
          name: dxc-${{ inputs.SKU }}-${{ inputs.TestTarget }}
          path: ${{ runner.temp }}
      - name: Extract install prefix
        shell: bash
        run: |
            set -euxo pipefail
            cd $GITHUB_WORKSPACE
            rm -rf install dxc-dist
            mkdir -p install dxc-dist
            # Pipe the archive in via stdin and use a relative -C path so
            # tar doesn't try to parse the Windows drive letter or treat
            # backslashes as escape characters.
            tar xf - -C install < "$RUNNER_TEMP/build-artifacts.tar"
            tar xf - -C dxc-dist < "$RUNNER_TEMP/dxc-artifacts.tar"
      - name: Setup Windows x64
        if: inputs.OS == 'windows' && runner.arch != 'ARM64'
        uses: llvm/actions/setup-windows@89a8cf80982d830faab019237860b344a6390c30 # main
        with:
          arch: amd64
      - name: Setup Windows ARM64
        if: inputs.OS == 'windows' && runner.arch == 'ARM64'
        uses: llvm/actions/setup-windows@89a8cf80982d830faab019237860b344a6390c30 # main
        with:
          arch: arm64
      - name: Setup Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
      - name: Install lit and pyyaml
        # The test runner needs only lit + pyyaml. We install from the
        # requirements.txt that the build job ships inside the install
        # prefix (test/CMakeLists.txt installs it under the
        # offload-test-suite component). That keeps a single source of
        # truth for pinned versions and avoids drift between this step
        # and OffloadTest/test/requirements.txt.
        #
        # We invoke pip explicitly here instead of relying on
        # setup-python's `pip-install:` input, which was observed to
        # silently no-op on our self-hosted Windows runners.
        #
        # When pip can't write to the interpreter's system site-packages
        # (e.g. on self-hosted Windows runners running as NetworkService,
        # which can't write under C:\Program Files\Python313; or on a
        # POSIX host where the system Python is owned by root), pip
        # falls back to a --user install. The console script wrappers
        # (e.g. lit.exe on Windows, lit on POSIX) then land in the
        # user-scheme scripts dir, which is NOT on PATH by default:
        #   - Windows: %APPDATA%\Python\PythonXY\Scripts
        #   - Linux:   ~/.local/bin
        #   - macOS:   ~/Library/Python/X.Y/bin
        # We compute that dir from sysconfig (portable across all three
        # platforms) and prepend it to PATH for all subsequent steps so
        # `lit` resolves correctly regardless of where pip put it.
        shell: bash
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r "$GITHUB_WORKSPACE/install/share/hlsl-test-suite/requirements.txt"
          user_scripts=$(python -c "import sysconfig; print(sysconfig.get_path('scripts', f'{sysconfig.get_default_scheme()}_user'))")
          echo "User scripts dir: $user_scripts"
          echo "$user_scripts" >> "$GITHUB_PATH"
      - name: Dump GPU Info (test runner)
        shell: bash
        run: |
            $GITHUB_WORKSPACE/install/bin/api-query
      - name: Resolve lit suite from TestTarget
        id: suite
        shell: bash
        run: |
            # SplitBuild callers always pass a single specific suite as
            # TestTarget=check-hlsl-<suite>. Strip the prefix to get the
            # suite name configure-test-suite.py understands.
            set -euxo pipefail
            target='${{ inputs.TestTarget }}'
            case "$target" in
              check-hlsl-*)
                suite="${target#check-hlsl-}"
                ;;
              *)
                echo "::error::SplitBuild requires TestTarget=check-hlsl-<suite>, got: $target"
                exit 1
                ;;
            esac
            case "$suite" in
              vk-lavapipe) suite="vk" ;;
              clang-vk-lavapipe) suite="clang-vk" ;;
            esac
            echo "suite=$suite" >> $GITHUB_OUTPUT
            echo "Will run lit suite: $suite"
      - name: Configure standalone test suite
        shell: bash
        run: |
            set -euxo pipefail
            cd "$GITHUB_WORKSPACE/install/share/hlsl-test-suite"
            # Locate dxc in the separate DXC install prefix. .exe on Windows,
            # bare name elsewhere.
            dxc_path="$GITHUB_WORKSPACE/dxc-dist/bin/dxc"
            if [ -x "${dxc_path}.exe" ]; then dxc_path="${dxc_path}.exe"; fi
            warp_arch_args=()
            if [ '${{ inputs.OS }}' = 'windows' ]; then
              if [ '${{ runner.arch }}' = 'ARM64' ]; then
                warp_arch_args=(--warp-arch arm64)
              else
                warp_arch_args=(--warp-arch x64)
              fi
            fi
            python configure-test-suite.py \
              --suite "${{ steps.suite.outputs.suite }}" \
              --dxc-path "$dxc_path" \
              "${warp_arch_args[@]}"
      - name: Setup Lavapipe
        if: contains(inputs.TestTarget, 'lavapipe')
        shell: bash
        run: |
            set -euxo pipefail
            echo "OFFLOADTEST_GPU_NAME=llvmpipe" >> "$GITHUB_ENV"
            # See previous "Setup Lavapipe" step for details on how we resolve the ICD path.
            icd=""
            if [ -n "${LAVAPIPE_ICD_JSON:-}" ]; then
              fs=$(printf '%s' "$LAVAPIPE_ICD_JSON" | sed 's|\\|/|g')
              if [ -f "$fs" ]; then
                icd="$LAVAPIPE_ICD_JSON"
              else
                echo "::warning::LAVAPIPE_ICD_JSON is set but does not point to an existing file: $LAVAPIPE_ICD_JSON"
              fi
            fi
            if [ -z "$icd" ]; then
              matches=$(MSYS_NO_PATHCONV=1 reg query "HKLM\\SOFTWARE\\Khronos\\Vulkan\\Drivers" /reg:64 2>/dev/null | grep -i "lvp_icd") || matches=""
              line=${matches%%$'\n'*}
              cand=$(printf '%s' "$line" | sed -E 's/^[[:space:]]+//; s/[[:space:]]+REG_[A-Z_]+[[:space:]]+0x[0-9A-Fa-f]+[[:space:]]*$//')
              if [ -n "$cand" ]; then
                fs=$(printf '%s' "$cand" | sed 's|\\|/|g')
                if [ -f "$fs" ]; then
                  icd="$cand"
                fi
              fi
            fi
            if [ -z "$icd" ]; then
              echo "::notice::No lavapipe ICD resolved via LAVAPIPE_ICD_JSON or HKLM\\SOFTWARE\\Khronos\\Vulkan\\Drivers; relying on machine-wide registration and adapter-regex device selection."
              exit 0
            fi
            # VK_DRIVER_FILES is the modern loader variable; VK_ICD_FILENAMES is
            # the legacy fallback for older loaders. Point both at only lavapipe.
            echo "VK_DRIVER_FILES=$icd" >> "$GITHUB_ENV"
            echo "VK_ICD_FILENAMES=$icd" >> "$GITHUB_ENV"
            echo "Using lavapipe ICD: $icd"
      - name: Run HLSL Tests
        shell: bash
        run: |
            set -euxo pipefail
            cd $GITHUB_WORKSPACE/install/share/hlsl-test-suite
            suite='${{ steps.suite.outputs.suite }}'
            lit -v "run/test/$suite" \
              --xunit-xml-output="run/test/$suite/testresults.xunit.xml"
      - name: Publish Test Results (macOS)
        uses: EnricoMi/publish-unit-test-result-action/macos@34d7c956a59aed1bfebf31df77b8de55db9bbaaf # v2.21.0
        if: always() && inputs.OS == 'macOS'
        with:
          comment_mode: off
          files: ${{ github.workspace }}/install/share/hlsl-test-suite/run/test/**/testresults.xunit.xml
      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-${{ inputs.SKU }}-${{ inputs.TestTarget }}
          path: ${{ github.workspace }}/install/share/hlsl-test-suite/run/test/**/testresults.xunit.xml
          if-no-files-found: ignore
      - name: Run dxdiag (Windows only)
        if: inputs.OS == 'windows' && failure()
        shell: powershell
        run: |
          $fileName = "dxdiag.txt"
          $output = Join-Path $env:RUNNER_TEMP $fileName
          dxdiag /t $output | Out-Null
          Write-Host "DxDiag report saved to $output"
      - name: Upload dxdiag artifact
        if: inputs.OS == 'windows' && failure()
        uses: actions/upload-artifact@v4
        with:
          name: dxdiag-${{ inputs.SKU }}-${{inputs.TestTarget}}.txt
          path: ${{ runner.temp }}/dxdiag.txt
