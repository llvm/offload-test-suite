name: Windows D3D12 Warp Preview Clang

permissions:
  contents: read

on:
  workflow_dispatch:
  ## Note: This workflow is intentionally made to NOT run on schedule or when
  ## modified by a PR due to a known issue where this workflow causes the
  ## machine to stall indefinitely.
  ## Issue link: https://github.com/llvm/offload-test-suite/issues/772

jobs:
  Windows-D3D12-Warp-Clang:
    permissions:
      contents: read
      checks: write
    uses: ./.github/workflows/build-and-test-callable.yaml
    with:
      OS: windows
      SKU: windows-amd
      TestTarget: check-hlsl-clang-warp-d3d12
      TestTargetReconvergence: check-hlsl-clang-warp-d3d12-reconvergence
      OffloadTest-branch: ${{ github.ref }}
      LLVM-ExtraCMakeArgs: -DCMAKE_C_COMPILER=clang-cl -DCMAKE_CXX_COMPILER=clang-cl -DOFFLOADTEST_USE_CLANG_TIDY=On -DWARP_VERSION=1.0.19-preview
