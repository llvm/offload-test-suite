name: Windows D3D12 NVIDIA DXC

permissions:
  contents: read

on:
  workflow_dispatch:
  schedule:
    - cron: '0 */4 * * *' # run every 4 hours
  pull_request:
    paths:
     - .github/workflows/windows-nvidia-dxc-d3d12.yaml

jobs:
  Windows-D3D12-NVIDIA-DXC:
    permissions:
      contents: read
      checks: write
    uses: ./.github/workflows/build-and-test-callable.yaml
    with:
      OS: windows
      SKU: windows-nvidia
      BuildType: Debug
      TestTarget: check-hlsl-d3d12
      OffloadTest-branch: fix-test-job-regen
      OffloadTest-fork: bob80905
      LLVM-branch: hlsl-offload-distribution
      LLVM-fork: bob80905
      SplitBuild: true
      LLVM-ExtraCMakeArgs: -DCMAKE_C_COMPILER=clang-cl -DCMAKE_CXX_COMPILER=clang-cl
