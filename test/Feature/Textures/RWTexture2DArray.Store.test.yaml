#--- source.hlsl
[[vk::binding(0, 0)]] RWTexture2DArray<float4> Out : register(u0);

[numthreads(16, 4, 1)]
void main(uint3 DTid : SV_DispatchThreadID) {
  // Encode (x, slice) into the texel so readback can verify per-slice writes.
  // Slice 0: x ramp in the R channel; slice 1: x ramp in the G channel.
  if (DTid.z == 0)
    Out[DTid] = float4(DTid.x / 15.0f, 0.0f, 0.0f, 1.0f);
  else
    Out[DTid] = float4(0.0f, DTid.x / 15.0f, 0.0f, 1.0f);
}

