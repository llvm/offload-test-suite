#--- source.hlsl
[[vk::binding(0, 0)]] Texture2DMSArray<float4> Tex : register(t0);
[[vk::binding(1, 0)]] RWBuffer<float4> Out : register(u0);

[numthreads(1, 1, 1)]
void main() {
  Out[0] = Tex.Load(int3(0, 0, 0), 0);
  Out[1] = Tex.Load(int3(1, 0, 1), 1);
  Out[2] = Tex.Load(int3(0, 0, 0), 2);
  Out[3] = Tex.Load(int3(1, 0, 1), 3);
}

