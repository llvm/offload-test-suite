#--- source.hlsl
[[vk::binding(0, 0)]] Texture2DMS<float4> Tex : register(t0);
[[vk::binding(1, 0)]] RWBuffer<float4> Out : register(u0);

[numthreads(1, 1, 1)]
void main() {
  // Explicit Load(int2, int)
  // Location: ((x, y), sample)
  Out[0] = Tex.Load(int2(0, 0), 0); // Dim Red
  Out[1] = Tex.Load(int2(1, 0), 1); // Dark Green
  Out[2] = Tex.Load(int2(0, 1), 2); // Bright Blue
  Out[3] = Tex.Load(int2(1, 1), 3); // White

  // Load(int2, int, int2) - With Offset
  // (0,0) + (1,0) = (1,0) -> Dim Green
  Out[4] = Tex.Load(int2(0, 0), 0, int2(1, 0));

  // (1,1) + (-1,-1) = (0,0) -> Dark Red
  Out[5] = Tex.Load(int2(1, 1), 1, int2(-1, -1));

  // (0,0) + (1,1) = (1,1) -> Bright White
  Out[6] = Tex.Load(int2(0, 0), 2, int2(1, 1));
}

//--- pipeline.yaml
---
Shaders:
  - Stage: Compute
    Entry: main
    DispatchSize: [1, 1, 1]

Buffers:
  - Name: Tex
    Format: Float32
    Channels: 4
    OutputProps: { Width: 2, Height: 2, Depth: 1, SampleCount: 4 }
    Data: [
        0.25, 0.0, 0.0, 1.0, # Dim Red      (0,0) sample 0
        0.5, 0.0, 0.0, 1.0,  # Dark Red     (0,0) sample 1
        0.75, 0.0, 0.0, 1.0, # Bright Red   (0,0) sample 2
        1.0, 0.0, 0.0, 1.0,  # Red          (0,0) sample 3
        0.0, 0.25, 0.0, 1.0, # Dim Green    (1,0) sample 0
        0.0, 0.5, 0.0, 1.0,  # Dark Green   (1,0) sample 1
        0.0, 0.75, 0.0, 1.0, # Bright Green (1,0) sample 2
        0.0, 1.0, 0.0, 1.0,  # Green        (1,0) sample 3
        0.0, 0.0, 0.25, 1.0, # Dim Blue     (0,1) sample 0
        0.0, 0.0, 0.5, 1.0,  # Dark Blue    (0,1) sample 1
        0.0, 0.0, 0.75, 1.0, # Bright Blue  (0,1) sample 2
        0.0, 0.0, 1.0, 1.0,  # Blue         (0,1) sample 3
        0.25, 0.25, 0.25, 1.0, # Dim White   (1,1) sample 0
        0.5, 0.5, 0.5, 1.0,  # Dark White   (1,1) sample 1
        0.75, 0.75, 0.75, 1.0, # Bright White (1,1) sample 2
        1.0, 1.0, 1.0, 1.0 ] # White        (1,1) sample 3

  - Name: Out
    Format: Float32
    Channels: 4
    FillSize: 112 # 7 * sizeof(float4)

  - Name: Expected
    Format: Float32
    Channels: 4
    Data: [ 0.25, 0.0, 0.0, 1.0,
            0.0, 0.5, 0.0, 1.0,
            0.0, 0.0, 0.75, 1.0,  # Sample 2 for (0,1) -> Bright Blue
            1.0, 1.0, 1.0, 1.0,  # Sample 3 for (1,1) -> White
            0.0, 0.25, 0.0, 1.0,  # Offset (1,0) -> Dim Green
            0.5, 0.0, 0.0, 1.0,  # Offset (-1,-1) sample 1 -> Dark Red
            0.75, 0.75, 0.75, 1.0 ] # Offset (1,1) sample 2 -> Bright White

DescriptorSets:
  - Resources:
    - Name: Tex
      Kind: Texture2DMS
      DirectXBinding: { Register: 0, Space: 0 }
      VulkanBinding: { Binding: 0 }
    - Name: Out
      Kind: RWBuffer
      DirectXBinding: { Register: 0, Space: 0 }
      VulkanBinding: { Binding: 1 }

Results:
  - Result: LoadTest
    Rule: BufferExact
    Actual: Out
    Expected: Expected
...
#--- end

# Unimplemented: Clang + DX: https://github.com/llvm/llvm-project/issues/101558
# XFAIL: DirectX || Metal

# Unimplemented: Clang + Vulkan: https://github.com/llvm/llvm-project/issues/124566
# XFAIL: Clang && Vulkan

# Intel Vulkan reports shaderStorageImageMultisample, but this test currently
# reads sample 0 values for sample 1/2/3 after multisample upload.
# XFAIL: Intel && Vulkan

# REQUIRES: SampleCount_4
# REQUIRES: shaderStorageImageMultisample

# RUN: split-file %s %t
# RUN: %dxc_target -T cs_6_0 -Fo %t.o %t/source.hlsl
# RUN: %offloader %t/pipeline.yaml %t.o
