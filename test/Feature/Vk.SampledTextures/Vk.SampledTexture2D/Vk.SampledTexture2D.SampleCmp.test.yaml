#--- vertex.hlsl
struct VSInput {
  float3 Pos : POSITION;
};

struct VSOutput {
  float4 Pos : SV_POSITION;
};

VSOutput mainVS(VSInput input) {
  VSOutput output;
  output.Pos = float4(input.Pos, 1.0f);
  return output;
}

#--- pixel.hlsl
[[vk::binding(0, 0)]] vk::SampledTexture2D<float4> SampledTexLess : register(s0); // Less
[[vk::binding(1, 0)]] vk::SampledTexture2D<float4> SampledTexGreater : register(s1); // Greater
[[vk::binding(2, 0)]] RWBuffer<float> Out : register(u0);

float4 mainPS(float4 Pos : SV_POSITION) : SV_Target {
  float2 uv = float2(0.5, 0.5);

  // 1. Ref = 0.5. SampledTexLess (Less: Ref < Sample).
  float r0 = SampledTexLess.SampleCmp(uv, 0.5);

  // 2. Ref = 0.1. (Less: Ref < Sample).
  float r1 = SampledTexLess.SampleCmp(uv, 0.1);

  // 3. Ref = 0.9. (Less: Ref < Sample).
  float r2 = SampledTexLess.SampleCmp(uv, 0.9);

  // 4. Ref = 0.5. SampledTexGreater (Greater: Ref > Sample).
  float r3 = SampledTexGreater.SampleCmp(uv, 0.5);

  // 5. Ref = 0.5. Offset (-1, -1). SampledTexLess (Less: Ref < Sample).
  float r4 = SampledTexLess.SampleCmp(uv, 0.5, int2(-1, -1));

  // 6. Ref = 0.5. Clamp 0.0. SampledTexLess (Less: Ref < Sample).
  float r5 = SampledTexLess.SampleCmp(uv, 0.5, int2(0, 0), 0.0);

  // 7. Ref = 0.5. Location (0.25, 0.25). SampledTexLess (Less: Ref < Sample).
  float r6 = SampledTexLess.SampleCmp(float2(0.25, 0.25), 0.5);

  // 8. SampleCmpLevelZero (LOD 0 explicit) Ref = 0.5
  float r7 = SampledTexLess.SampleCmpLevelZero(uv, 0.5);

  // 9. SampleCmpLevelZero Ref = 0.1
  float r8 = SampledTexLess.SampleCmpLevelZero(uv, 0.1);

  // 10. SampleCmpLevelZero Ref = 0.9
  float r9 = SampledTexLess.SampleCmpLevelZero(uv, 0.9);

  // 11. SampleCmpLevelZero Offset (-1, -1)
  float r10 = SampledTexLess.SampleCmpLevelZero(uv, 0.5, int2(-1, -1));

  // 12. SampleCmpLevelZero SampledTexGreater
  float r11 = SampledTexGreater.SampleCmpLevelZero(uv, 0.5);

  // 13. SampleCmpLevelZero Location
  float r12 = SampledTexLess.SampleCmpLevelZero(float2(0.25, 0.25), 0.5);

  if (all((int2)Pos.xy == 0)) {
    Out[0] = r0;
    Out[1] = r1;
    Out[2] = r2;
    Out[3] = r3;
    Out[4] = r4;
    Out[5] = r5;
    Out[6] = r6;
    Out[7] = r7;
    Out[8] = r8;
    Out[9] = r9;
    Out[10] = r10;
    Out[11] = r11;
    Out[12] = r12;
  }
  return float4(0,0,0,0);
}

//--- pipeline.yaml
---
Shaders:
  - Stage: Vertex
    Entry: mainVS
  - Stage: Pixel
    Entry: mainPS

Buffers:
  - Name: SampledTexLess
    Format: Depth32
    Channels: 1
    OutputProps: { Width: 2, Height: 2, Depth: 1 }
    Data: [ 0.2,  # (0,0) -> 0.2
            0.8,  # (1,0) -> 0.8
            0.2,  # (0,1) -> 0.2
            0.8 ] # (1,1) -> 0.8

  - Name: SampledTexGreater
    Format: Depth32
    Channels: 1
    OutputProps: { Width: 2, Height: 2, Depth: 1 }
    Data: [ 0.2,
            0.8,
            0.2,
            0.8 ]

  - Name: Out
    Format: Float32
    Channels: 1
    FillSize: 52 # 13 * sizeof(float)

  - Name: Expected
    Format: Float32
    Channels: 1
    Data: [ 0.5, 1.0, 0.0, 0.5,
            0.0, 0.5, 0.0, 0.5,
            1.0, 0.0, 0.0, 0.5,
            0.0 ]

  - Name: RT
    Format: Float32
    Channels: 4
    FillSize: 16
    OutputProps: { Width: 1, Height: 1, Depth: 1 }

VertexBuffers:
  - Name: VB
    Streams:
      - Name: POSITION
        Format: RGB32Float
        Data: [-1.0, -1.0, 0.0,
                3.0, -1.0, 0.0,
               -1.0,  3.0, 0.0]

Bindings:
  VertexBuffer: VB
  RenderTarget: RT

Samplers:
  - Name: SampledTexLess
    Kind: SamplerComparison
    MinFilter: Linear
    MagFilter: Linear
    Address: Clamp
    ComparisonOp: Less
  - Name: SampledTexGreater
    Kind: SamplerComparison
    MinFilter: Linear
    MagFilter: Linear
    Address: Clamp
    ComparisonOp: Greater

DescriptorSets:
  - Resources:
    - Name: SampledTexLess
      Kind: SampledTexture2D
      DirectXBinding: { Register: 0, Space: 0 }
      VulkanBinding: { Binding: 0 }
    - Name: SampledTexGreater
      Kind: SampledTexture2D
      DirectXBinding: { Register: 1, Space: 0 }
      VulkanBinding: { Binding: 1 }
    - Name: Out
      Kind: RWBuffer
      DirectXBinding: { Register: 0, Space: 0 }
      VulkanBinding: { Binding: 2 }

Results:
  - Result: SampleCmpTest
    Rule: BufferFloatULP
    Actual: Out
    Expected: Expected
    ULPT: 1
...
#--- end

